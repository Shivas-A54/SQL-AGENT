<svg width="100%" viewBox="0 0 680 415" role="img" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif" style="">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Helvetica, Arial, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">NL2SQL Architecture Diagram</title>
